<div class="p-6 max-w-6xl">
  <h1 class="text-2xl font-semibold text-slate-800 mb-6">Statistiky</h1>

  <mat-card class="rounded-xl">
    <mat-card-header>
      <mat-card-title>Výdaje podle kategorie</mat-card-title>
    </mat-card-header>
    <mat-card-content class="h-80 pt-4">
      <canvas baseChart
      [data]="categoryChartData"
      [options]="categoryChartOptions"
      [type]="'doughnut'">
      </canvas>
    </mat-card-content>
  </mat-card>
</div>

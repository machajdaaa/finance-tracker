<h2 mat-dialog-title>Přidat transakci</h2>

<mat-dialog-content [formGroup]="form" class="flex flex-col gap-4 pt-6 min-w-80">

  <!-- Type -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Typ</mat-label>
    <mat-select formControlName="type">
      @for (type of types; track type.value) {
        <mat-option [value]="type.value">{{ type.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <!-- Category -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Kategorie</mat-label>
    <mat-select formControlName="category">
      @for (category of categories; track category) {
        <mat-option [value]="category">{{ getCategoryLabel(category) }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <!-- Amount -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Částka (Kč)</mat-label>
    <input matInput type="number" formControlName="amount" min="1">
  </mat-form-field>

  <!-- Description -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Popis</mat-label>
    <input matInput formControlName="description">
  </mat-form-field>

  <!-- Date -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Datum</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="date">
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button mat-button (click)="cancel()">Zrušit</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
    Přidat
  </button>
</mat-dialog-actions>
